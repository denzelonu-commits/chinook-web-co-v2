<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Chinook Web Co</title>
  <defs>
    <clipPath id="c-cutout">
      <!-- The octagon shape defines the clip region -->
      <polygon points="94,50 81.1,81.1 50,94 18.9,81.1 6,50 18.9,18.9 50,6 81.1,18.9"/>
    </clipPath>
    <mask id="c-mask">
      <!-- White = visible, black = punched out -->
      <!-- Start with full white (show everything) -->
      <polygon points="94,50 81.1,81.1 50,94 18.9,81.1 6,50 18.9,18.9 50,6 81.1,18.9" fill="white"/>
      <!-- Black arc = the C void -->
      <path
        d="M 70 26 A 30 30 0 1 0 70 74"
        stroke="black"
        stroke-width="22"
        stroke-linecap="butt"
        fill="none"
      />
    </mask>
  </defs>

  <!-- Octagon with C punched out via mask — fully transparent background -->
  <polygon
    points="94,50 81.1,81.1 50,94 18.9,81.1 6,50 18.9,18.9 50,6 81.1,18.9"
    fill="#F5F1EC"
    mask="url(#c-mask)"
  />
  <!-- Precision outline -->
  <polygon
    points="94,50 81.1,81.1 50,94 18.9,81.1 6,50 18.9,18.9 50,6 81.1,18.9"
    fill="none"
    stroke="#F5F1EC"
    stroke-width="0.5"
    mask="url(#c-mask)"
  />
  <!-- Orange structural tick at C opening -->
  <line x1="72" y1="50" x2="84" y2="50" stroke="#E07B2A" stroke-width="1" stroke-linecap="square"/>
</svg>
