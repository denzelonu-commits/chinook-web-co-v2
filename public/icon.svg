<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <title>Chinook Web Co</title>

  <!-- Left vertical post -->
  <line x1="22" y1="20" x2="22" y2="80" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Right vertical post -->
  <line x1="78" y1="20" x2="78" y2="80" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Arch crown -->
  <path d="M 22 20 Q 50 10 78 20" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Three internal strata rules — fading downward -->
  <line x1="30" y1="40" x2="70" y2="40" stroke="#0a0a0a" stroke-width="1.5" opacity="0.9"/>
  <line x1="30" y1="52" x2="70" y2="52" stroke="#0a0a0a" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="64" x2="70" y2="64" stroke="#0a0a0a" stroke-width="1.5" opacity="0.35"/>

  <!-- Corner register ticks — top left -->
  <line x1="14" y1="20" x2="22" y2="20" stroke="#0a0a0a" stroke-width="1.5" opacity="0.5"/>
  <line x1="22" y1="12" x2="22" y2="20" stroke="#0a0a0a" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner register ticks — top right -->
  <line x1="78" y1="20" x2="86" y2="20" stroke="#0a0a0a" stroke-width="1.5" opacity="0.5"/>
  <line x1="78" y1="12" x2="78" y2="20" stroke="#0a0a0a" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom open — registration dots -->
  <circle cx="22" cy="80" r="2.5" fill="#0a0a0a" opacity="0.5"/>
  <circle cx="78" cy="80" r="2.5" fill="#0a0a0a" opacity="0.5"/>

  <!-- Orange apex tick -->
  <line x1="50" y1="7" x2="50" y2="17" stroke="#E07B2A" stroke-width="2" stroke-linecap="square"/>
</svg>
